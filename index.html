<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azero QR Pro - Clean Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Stable QR Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            color: #e2e8f0;
        }
        .glass-card {
            background: rgba(15, 15, 20, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }
        .btn-primary:active { transform: scale(0.97); }
        
        #qrcode {
            display: flex;
            justify-content: center;
        }
        #qrcode img, #qrcode canvas {
            max-width: 100% !important;
            height: auto !important;
            border-radius: 8px;
        }

        .qr-wrapper {
            background: white;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .blue-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 md:p-12 overflow-x-hidden">

    <div class="blue-glow top-[-100px] right-[-100px]"></div>
    <div class="blue-glow bottom-[-100px] left-[-100px]"></div>

    <main class="w-full max-w-md space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
        <!-- Brand Header -->
        <header class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black text-xl text-white shadow-lg shadow-blue-900/30">Z</div>
            <div>
                <h1 class="text-xl font-extrabold text-white leading-none tracking-tight">AZERO <span class="text-blue-500 uppercase">QR</span></h1>
                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.2em]">Minimalist System</p>
            </div>
        </header>

        <!-- Tool Card -->
        <div class="glass-card rounded-[2rem] p-5 space-y-4">
            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">URL / Link Tujuan</label>
                <div class="relative group">
                    <i data-lucide="link" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                    <input 
                        type="text" 
                        id="urlInput"
                        placeholder="example.com"
                        class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-blue-500/50 text-sm transition-all placeholder:text-slate-600"
                    >
                </div>
            </div>

            <button 
                onclick="generateQR()"
                class="btn-primary w-full text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 text-sm shadow-xl shadow-blue-900/20"
            >
                <i data-lucide="zap" class="w-4 h-4" id="genIcon"></i> Buat QR Code
            </button>
        </div>

        <!-- Result Section -->
        <div id="resultCard" class="hidden opacity-0 transition-all duration-500">
            <div class="glass-card rounded-[2rem] p-6 flex flex-col items-center gap-6 shadow-2xl">
                <!-- QR Wrapper -->
                <div class="qr-wrapper">
                    <div id="qrcode"></div>
                </div>

                <div class="w-full space-y-3">
                    <!-- URL Info -->
                    <div class="flex items-center justify-between bg-black/40 border border-white/5 rounded-xl p-3">
                        <span id="displayUrl" class="text-[11px] text-slate-400 font-medium truncate max-w-[200px]"></span>
                        <button onclick="copyToClipboard()" class="p-1.5 hover:bg-blue-500/10 rounded-lg text-blue-500 transition-colors">
                            <i id="copyIcon" data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                    </div>

                    <!-- Action Buttons -->
                    <div class="grid grid-cols-2 gap-3">
                        <button 
                            onclick="downloadQR()"
                            class="bg-white/5 border border-white/10 hover:bg-white/10 text-white py-2.5 rounded-xl font-bold text-xs flex items-center justify-center gap-2 transition-all"
                        >
                            <i data-lucide="download" class="w-4 h-4"></i> Simpan
                        </button>
                        <button 
                            onclick="shareLink()"
                            class="bg-blue-600/10 border border-blue-500/20 text-blue-500 py-2.5 rounded-xl font-bold text-xs flex items-center justify-center gap-2 transition-all hover:bg-blue-600/20"
                        >
                            <i data-lucide="share-2" class="w-4 h-4"></i> Share
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <p class="text-center text-[9px] text-slate-700 font-black tracking-[0.4em] uppercase pt-4">Azero Design System • 2026</p>
    </main>

    <!-- Simple Toast -->
    <div id="toast" class="fixed bottom-6 bg-white text-black px-6 py-3 rounded-full font-bold text-xs shadow-2xl translate-y-24 opacity-0 transition-all duration-300">
        Berhasil!
    </div>

    <script>
        lucide.createIcons();

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.replace('translate-y-24', 'translate-y-0');
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.replace('translate-y-0', 'translate-y-24');
                toast.classList.replace('opacity-100', 'opacity-0');
            }, 2000);
        }

        function generateQR() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim() || 'pay.azero.my.id';
            const cleanUrl = url.startsWith('http') ? url : `https://${url}`;
            const qrDiv = document.getElementById('qrcode');
            const resultCard = document.getElementById('resultCard');
            const genIcon = document.getElementById('genIcon');
            
            genIcon.classList.add('animate-spin');

            try {
                qrDiv.innerHTML = "";
                
                // Init QRCode
                new QRCode(qrDiv, {
                    text: cleanUrl,
                    width: 256,
                    height: 256,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });

                document.getElementById('displayUrl').innerText = url;
                resultCard.classList.remove('hidden');
                
                setTimeout(() => {
                    resultCard.classList.replace('opacity-0', 'opacity-100');
                    genIcon.classList.remove('animate-spin');
                }, 100);
            } catch (e) {
                showToast("URL tidak valid!");
                genIcon.classList.remove('animate-spin');
            }
        }

        function downloadQR() {
            const qrCanvas = document.querySelector('#qrcode canvas');
            const qrImg = document.querySelector('#qrcode img');
            
            const link = document.createElement('a');
            link.download = `azero-qr-${Date.now()}.png`;
            
            if (qrCanvas) {
                link.href = qrCanvas.toDataURL("image/png");
            } else if (qrImg) {
                link.href = qrImg.src;
            }
            
            link.click();
            showToast("PNG tersimpan!");
        }

        function copyToClipboard() {
            const url = document.getElementById('urlInput').value || 'pay.azero.my.id';
            navigator.clipboard.writeText(url).then(() => {
                showToast("Link disalin!");
                const icon = document.getElementById('copyIcon');
                icon.setAttribute('data-lucide', 'check');
                lucide.createIcons();
                setTimeout(() => {
                    icon.setAttribute('data-lucide', 'copy');
                    lucide.createIcons();
                }, 2000);
            });
        }

        function shareLink() {
            if (navigator.share) {
                navigator.share({
                    title: 'Azero QR',
                    url: document.getElementById('urlInput').value || 'pay.azero.my.id'
                });
            } else {
                showToast("Fitur share tidak tersedia.");
            }
        }

        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateQR();
        });
    </script>
</body>
</html>
